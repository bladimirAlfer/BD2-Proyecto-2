services:
  db:
    image: pgvector/pgvector:pg16
    container_name: multimodal_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-multimodal_db}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: multimodal_api
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-multimodal_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      K_TEXT: ${K_TEXT:-5000}
      K_VISUAL: ${K_VISUAL:-256}
      K_AUDIO: ${K_AUDIO:-256}
      TOP_K: ${TOP_K:-10}
      DATA_DIR: ${DATA_DIR:-data}
      RESULTS_DIR: ${RESULTS_DIR:-results}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  app:
    build: .
    container_name: multimodal_streamlit
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - api
    command: streamlit run app/streamlit_app.py --server.address 0.0.0.0 --server.port 8501

volumes:
  postgres_data:
